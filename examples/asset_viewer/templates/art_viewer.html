{% extends "base.html" %}

{% block title %}Art Viewer - Ultima Online Asset Viewer{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="fas fa-image"></i> Static Art Tiles</h2>
        <p class="text-muted">Browse and search through Ultima Online's static art collection.</p>
    </div>
</div>

<div class="controls">
    <div class="row">
        <div class="col-md-6">
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="number" class="form-control" id="artIdInput" placeholder="Enter Art ID (0-65535)" min="0" max="65535">
                <button class="btn btn-outline-primary" type="button" onclick="loadSpecificArt()">
                    <i class="fas fa-search"></i> Load
                </button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="d-flex justify-content-end">
                <button class="btn btn-outline-secondary me-2" onclick="loadRange()">
                    <i class="fas fa-list"></i> Load Range
                </button>
                <button class="btn btn-outline-info" onclick="clearGrid()">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-md-6">
            <label for="startRange" class="form-label">Start ID:</label>
            <input type="number" class="form-control" id="startRange" value="0" min="0" max="65535">
        </div>
        <div class="col-md-6">
            <label for="endRange" class="form-label">End ID:</label>
            <input type="number" class="form-control" id="endRange" value="100" min="0" max="65535">
        </div>
    </div>
</div>

<div id="loadingIndicator" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>Loading assets...</p>
</div>

<div id="errorMessage" class="error-message" style="display: none;"></div>

<div class="asset-grid" id="artGrid"></div>

<div class="modal fade" id="artModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Art Tile Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modalImage" src="" alt="Art Tile" class="img-fluid">
                <div class="mt-3">
                    <h6>ID: <span id="modalId"></span></h6>
                    <p id="modalInfo"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="downloadImage()">
                    <i class="fas fa-download"></i> Download PNG
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentArtData = {};

function showLoading() {
    document.getElementById('loadingIndicator').style.display = 'block';
    document.getElementById('errorMessage').style.display = 'none';
}

function hideLoading() {
    document.getElementById('loadingIndicator').style.display = 'none';
}

function showError(message) {
    document.getElementById('errorMessage').textContent = message;
    document.getElementById('errorMessage').style.display = 'block';
    hideLoading();
}

function loadSpecificArt() {
    const artId = parseInt(document.getElementById('artIdInput').value);
    if (isNaN(artId) || artId < 0 || artId > 65535) {
        showError('Please enter a valid Art ID (0-65535)');
        return;
    }

    showLoading();
    fetch(`/api/art/${artId}`)
        .then(response => response.json())
        .then(data => {
            hideLoading();
            if (data.error) {
                showError(data.error);
                return;
            }
            displayArt([data]);
            currentArtData[artId] = data;
        })
        .catch(error => {
            showError('Failed to load art: ' + error.message);
        });
}

function loadRange() {
    const startId = parseInt(document.getElementById('startRange').value);
    const endId = parseInt(document.getElementById('endRange').value);

    if (isNaN(startId) || isNaN(endId) || startId > endId || startId < 0 || endId > 65535) {
        showError('Please enter valid range (0-65535)');
        return;
    }

    showLoading();
    const promises = [];
    for (let i = startId; i <= Math.min(endId, startId + 50); i++) { // Limit to 50 items
        promises.push(
            fetch(`/api/art/${i}`)
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        currentArtData[i] = data;
                        return data;
                    }
                    return null;
                })
                .catch(() => null)
        );
    }

    Promise.all(promises).then(results => {
        hideLoading();
        const validResults = results.filter(r => r !== null);
        displayArt(validResults);
    });
}

function displayArt(artItems) {
    const grid = document.getElementById('artGrid');
    artItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'asset-item';
        div.innerHTML = `
            <img src="${item.image}" alt="Art ${item.id}" class="asset-image" onclick="showModal(${item.id})">
            <div class="asset-id">#${item.id}</div>
            <div class="tile-info">${item.width}×${item.height}</div>
        `;
        grid.appendChild(div);
    });
}

function showModal(artId) {
    const data = currentArtData[artId];
    if (!data) return;

    document.getElementById('modalImage').src = data.image;
    document.getElementById('modalId').textContent = artId;
    document.getElementById('modalInfo').textContent = `${data.width}×${data.height} pixels`;

    const modal = new bootstrap.Modal(document.getElementById('artModal'));
    modal.show();
}

function downloadImage() {
    const artId = document.getElementById('modalId').textContent;
    const data = currentArtData[artId];
    if (!data) return;

    const link = document.createElement('a');
    link.href = data.image;
    link.download = `art_${artId}.png`;
    link.click();
}

function clearGrid() {
    document.getElementById('artGrid').innerHTML = '';
    currentArtData = {};
    document.getElementById('errorMessage').style.display = 'none';
}

// Load initial range on page load
document.addEventListener('DOMContentLoaded', function() {
    loadRange();
});
</script>
{% endblock %}
