{% extends "base.html" %}

{% block title %}Radar Colors Viewer - Ultima Online Asset Viewer{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="fas fa-map"></i> Radar Colors</h2>
        <p class="text-muted">Browse Ultima Online's minimap color palette.</p>
    </div>
</div>

<div class="controls">
    <button class="btn btn-primary" onclick="loadRadarColors()">
        <i class="fas fa-sync"></i> Load Colors
    </button>
</div>

<div id="loadingIndicator" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>Loading radar colors...</p>
</div>

<div id="errorMessage" class="error-message" style="display: none;"></div>

<div class="asset-grid" id="radarGrid"></div>

<div class="modal fade" id="colorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Color Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div id="modalColor" class="mx-auto mb-3" style="width: 100px; height: 100px; border: 2px solid #dee2e6; border-radius: 8px;"></div>
                <h6>ID: <span id="modalId"></span></h6>
                <p>Hex: <span id="modalHex"></span></p>
                <p>RGB: <span id="modalRgb"></span></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let radarColors = [];

function showLoading() {
    document.getElementById('loadingIndicator').style.display = 'block';
    document.getElementById('errorMessage').style.display = 'none';
}

function hideLoading() {
    document.getElementById('loadingIndicator').style.display = 'none';
}

function showError(message) {
    document.getElementById('errorMessage').textContent = message;
    document.getElementById('errorMessage').style.display = 'block';
    hideLoading();
}

function loadRadarColors() {
    showLoading();
    fetch('/api/radar')
        .then(response => response.json())
        .then(data => {
            hideLoading();
            if (data.error) {
                showError(data.error);
                return;
            }
            radarColors = data.colors;
            displayRadarColors(radarColors);
        })
        .catch(error => {
            showError('Failed to load radar colors: ' + error.message);
        });
}

function displayRadarColors(colors) {
    const grid = document.getElementById('radarGrid');
    grid.innerHTML = '';

    colors.forEach(color => {
        const div = document.createElement('div');
        div.className = 'asset-item';
        div.onclick = () => showColorModal(color);

        div.innerHTML = `
            <div class="hue-preview" style="width: 60px; height: 60px; background-color: ${color.color}; margin: 0 auto 10px;"></div>
            <div class="asset-id">#${color.id}</div>
            <div class="tile-info">${color.color}</div>
        `;
        grid.appendChild(div);
    });
}

function showColorModal(color) {
    document.getElementById('modalColor').style.backgroundColor = color.color;
    document.getElementById('modalId').textContent = color.id;
    document.getElementById('modalHex').textContent = color.color;

    // Convert hex to RGB
    const hex = color.color.replace('#', '');
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    document.getElementById('modalRgb').textContent = `(${r}, ${g}, ${b})`;

    const modal = new bootstrap.Modal(document.getElementById('colorModal'));
    modal.show();
}

document.addEventListener('DOMContentLoaded', function() {
    loadRadarColors();
});
</script>
{% endblock %}
